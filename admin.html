<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeeParking | Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-slate-950 text-white min-h-screen">

<div id="loading" class="flex items-center justify-center min-h-screen">
  <div class="text-slate-400">Authenticating...</div>
</div>

<div id="dashboard" class="hidden">
  <header class="flex justify-between items-center px-6 py-4 border-b border-slate-800">
    <h1 class="text-xl font-semibold">Admin Dashboard</h1>
    <button onclick="logout()" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/30 transition">
      Logout
    </button>
  </header>

  <div class="p-6">
    <h2 class="text-lg font-semibold mb-4">Parking Events</h2>
    <div id="event-list" class="space-y-3 max-h-[600px] overflow-y-auto"></div>
  </div>
</div>

<script>
const SB_URL  = "https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";

const { createClient } = supabase;

const sb = createClient(SB_URL, SB_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

let initialized = false;

sb.auth.onAuthStateChange(async (event, session) => {

  if (initialized) return;  // prevent multiple triggers
  initialized = true;

  if (!session) {
    window.location.href = "login.html";
    return;
  }

  const user = session.user;

  const { data, error } = await sb
    .from("Profiles")
    .select("role")
    .eq("auth_user_id", user.id)
    .single();

  if (error || !data || data.role !== "Admin") {
    await sb.auth.signOut();
    window.location.href = "login.html";
    return;
  }

  document.getElementById("loading").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  loadEvents();
});

async function loadEvents() {
  const { data } = await sb
    .from("ParkingEvents")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(100);

  const container = document.getElementById("event-list");
  container.innerHTML = "";

  (data || []).forEach(ev => {
    const div = document.createElement("div");
    div.className = "bg-slate-900 p-4 rounded-xl border border-slate-800";
    div.innerHTML = `
      <div class="flex justify-between">
        <div class="font-semibold">${ev.plate_number}</div>
        <div class="${ev.event_type === 'ENTRY' ? 'text-emerald-400' : 'text-red-400'}">
          ${ev.event_type}
        </div>
      </div>
      <div class="text-xs text-slate-400 mt-1">
        ${new Date(ev.created_at).toLocaleString()}
      </div>
    `;
    container.appendChild(div);
  });
}

async function logout(){
  await sb.auth.signOut();
  window.location.href = "login.html";
}
</script>

</body>
</html>
