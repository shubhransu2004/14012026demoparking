<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="loading">Authenticating...</div>

<div id="dashboard" style="display:none;">
  <h1>Admin Dashboard</h1>
  <button onclick="logout()">Logout</button>
  <div id="events"></div>
</div>

<script>
const SB_URL  = "https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";

const { createClient } = supabase;

const sb = createClient(SB_URL, SB_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true,
    storageKey: "feeparking-auth"
  }
});

async function init() {
  const { data: { session } } = await sb.auth.getSession();

  console.log("SESSION:", session);

  if (!session) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("dashboard").style.display = "block";

  loadEvents();
}

async function loadEvents() {
  const { data } = await sb
    .from("ParkingEvents")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(50);

  const container = document.getElementById("events");
  container.innerHTML = "";

  (data || []).forEach(e => {
    const div = document.createElement("div");
    div.innerHTML = `
      <b>${e.plate_number}</b> - ${e.event_type} 
      <small>${new Date(e.created_at).toLocaleString()}</small>
    `;
    container.appendChild(div);
  });
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

init();
</script>

</body>
</html>
