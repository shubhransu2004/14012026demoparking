<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FeeParking Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Segoe UI, sans-serif;
  background:#0f172a;
  color:white;
}

.header{
  background:#111827;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2937;
}

.header h1{
  font-size:22px;
  letter-spacing:1px;
}

.logout-btn{
  background:#dc2626;
  border:none;
  padding:8px 16px;
  color:white;
  cursor:pointer;
  border-radius:4px;
}

.container{
  padding:30px 40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:8px;
}

.card h3{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:10px;
}

.stat-number{
  font-size:28px;
  font-weight:bold;
}

.table{
  width:100%;
  border-collapse:collapse;
}

.table th{
  text-align:left;
  padding:10px;
  font-size:13px;
  color:#94a3b8;
  border-bottom:1px solid #334155;
}

.table td{
  padding:10px;
  border-bottom:1px solid #1e293b;
  font-size:14px;
}

.section-title{
  margin:20px 0 10px 0;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <h1>FeeParking Admin Dashboard</h1>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">

  <div class="grid">
    <div class="card">
      <h3>Total Events</h3>
      <div id="totalEvents" class="stat-number">0</div>
    </div>
    <div class="card">
      <h3>Entries Today</h3>
      <div id="entryCount" class="stat-number">0</div>
    </div>
    <div class="card">
      <h3>Exits Today</h3>
      <div id="exitCount" class="stat-number">0</div>
    </div>
  </div>

  <div class="section-title">Live Devices</div>
  <div id="devices" class="grid"></div>

  <div class="section-title">Recent Parking Events</div>
  <table class="table">
    <thead>
      <tr>
        <th>Plate</th>
        <th>Type</th>
        <th>Time</th>
        <th>Device</th>
      </tr>
    </thead>
    <tbody id="events"></tbody>
  </table>

</div>

<script>
const SB_URL="https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";

const { createClient } = supabase;
const sb = createClient(SB_URL,SB_KEY);

async function init(){
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href="login.html"; return; }
  loadStats();
  loadEvents();
  loadDevices();
}

async function loadStats(){
  const { data } = await sb.from("ParkingEvents")
    .select("*")
    .order("created_at",{ascending:false});

  if(!data) return;

  document.getElementById("totalEvents").innerText=data.length;

  const today=new Date().toDateString();
  let entry=0, exit=0;

  data.forEach(e=>{
    if(new Date(e.created_at).toDateString()===today){
      if(e.event_type==="ENTRY") entry++;
      if(e.event_type==="EXIT") exit++;
    }
  });

  document.getElementById("entryCount").innerText=entry;
  document.getElementById("exitCount").innerText=exit;
}

async function loadEvents(){
  const { data } = await sb.from("ParkingEvents")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(20);

  const tbody=document.getElementById("events");
  tbody.innerHTML="";

  data.forEach(e=>{
    tbody.innerHTML+=`
      <tr>
        <td>${e.plate_number}</td>
        <td>${e.event_type}</td>
        <td>${new Date(e.created_at).toLocaleString()}</td>
        <td>${e.device_id || "-"}</td>
      </tr>
    `;
  });
}

async function loadDevices(){
  const { data } = await sb.from("Devices")
    .select("*");

  const container=document.getElementById("devices");
  container.innerHTML="";

  if(!data) return;

  data.forEach(d=>{
    container.innerHTML+=`
      <div class="card">
        <h3>${d.device_name}</h3>
        <div>Status: ${d.online ? "Online" : "Offline"}</div>
        <div>IP: ${d.ip_address || "-"}</div>
        <div>CPU: ${d.cpu_load || "-"}%</div>
        <div>Temp: ${d.temperature || "-"}°C</div>
      </div>
    `;
  });
}

async function logout(){
  await sb.auth.signOut();
  window.location.href="login.html";
}

setInterval(()=>{
  loadStats();
  loadEvents();
  loadDevices();
},5000);

init();
</script>

</body>
</html>
