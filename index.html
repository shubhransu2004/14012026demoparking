<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEEPARKING | Intelligent Urban Mobility</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-deep: #020204;
            --accent: #64ffda;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Ambient Background */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.3; animation: floatOrb 20s ease-in-out infinite alternate; }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #1e293b, transparent); top: -20%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(100, 255, 218, 0.15), transparent); bottom: -10%; right: -10%; }
        
        @keyframes floatOrb { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, -50px); } }

        /* Glass Panel */
        .glass-panel {
            position: relative; z-index: 10; width: 100%; max-width: 500px; padding: 3.5rem;
            background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px; box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
            text-align: center; opacity: 0; transform: translateY(20px); transition: opacity 1.2s ease, transform 0.2s ease-out;
            overflow: hidden;
        }

        .glass-panel::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 24px; z-index: -1;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255, 255, 255, 0.06), transparent 40%);
            opacity: 0; transition: opacity 0.5s;
        }
        .glass-panel:hover::before { opacity: 1; }
        .glass-panel.visible { opacity: 1; transform: translateY(0); }

        h1 { font-size: 3rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem; background: linear-gradient(to right, #fff 20%, #a5b4fc 40%, #a5b4fc 60%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: textShimmer 5s linear infinite; }
        @keyframes textShimmer { to { background-position: 200% center; } }
        
        p.subtitle { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.95rem; }

        /* Form Inputs */
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 20px; border-radius: 8px; color: #fff; font-family: 'Inter', sans-serif; font-size: 1rem;
            outline: none; transition: all 0.3s ease;
        }
        input:focus { border-color: var(--accent); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 4px rgba(100, 255, 218, 0.1); }
        input::placeholder { color: rgba(255,255,255,0.2); }

        /* Buttons */
        .btn {
            width: 100%; padding: 14px; background: var(--text-primary); color: #000; border: none;
            border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.95rem; letter-spacing: 0.5px;
            transition: all 0.2s; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.3); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .toggle-text { margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-secondary); }
        .toggle-text span { color: var(--accent); cursor: pointer; font-weight: 600; transition: 0.2s; }
        .toggle-text span:hover { text-shadow: 0 0 10px var(--accent); }

        /* Status Message */
        #status-msg { margin-top: 15px; font-size: 0.85rem; display: none; padding: 10px; border-radius: 6px; }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .msg-success { background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }

    </style>
</head>
<body>

    <canvas id="neural-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-panel" id="main-card">
        <h1>FEEPARKING</h1>
        <p class="subtitle" id="form-subtitle">Secure Access Portal</p>

        <div id="auth-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="enter your email" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn" id="action-btn" onclick="handleAuth()">
                <span>SECURE LOGIN</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <div id="status-msg"></div>

            <div class="toggle-text" id="toggle-container">
                New customer? <span onclick="toggleMode()">Create an account</span>
            </div>
        </div>
    </div>

    <script>
        // --- SUPABASE CONFIGURATION ---
        const SB_URL = "https://vlxyoxuejydfpclhxczr.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // --- UI STATE MANAGEMENT ---
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('status-msg').style.display = 'none';

            if (isLoginMode) {
                document.getElementById('form-subtitle').innerText = "Secure Access Portal";
                document.querySelector('#action-btn span').innerText = "SECURE LOGIN";
                document.getElementById('toggle-container').innerHTML = `New customer? <span onclick="toggleMode()">Create an account</span>`;
            } else {
                document.getElementById('form-subtitle').innerText = "Customer Registration";
                document.querySelector('#action-btn span').innerText = "CREATE ACCOUNT";
                document.getElementById('toggle-container').innerHTML = `Already have an account? <span onclick="toggleMode()">Log in</span>`;
            }
        }

        function showMessage(msg, isError = true) {
            const msgBox = document.getElementById('status-msg');
            msgBox.style.display = 'block';
            msgBox.innerText = msg;
            msgBox.className = isError ? 'msg-error' : 'msg-success';
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('action-btn');
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> <span>AUTHENTICATING...</span>`;
            } else {
                btn.disabled = false;
                btn.innerHTML = `<span>${isLoginMode ? 'SECURE LOGIN' : 'CREATE ACCOUNT'}</span> <i class="fa-solid fa-arrow-right"></i>`;
            }
        }

        // --- AUTHENTICATION LOGIC ---
        async function handleAuth() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                showMessage("Please fill in both email and password.");
                return;
            }

            setLoading(true);

            if (isLoginMode) {
                // LOGIN FLOW
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                
                if (error) {
                    showMessage(error.message);
                    setLoading(false);
                    return;
                }

                routeUser(data.user);

            } else {
                // SIGNUP FLOW (Customers Only)
                const { data, error } = await sb.auth.signUp({ email, password });
                
                if (error) {
                    showMessage(error.message);
                    setLoading(false);
                    return;
                }

                // FIX: Insert auth.user.id into the auth_user_id column!
                if (data.user) {
                    const { error: profileErr } = await sb.from("Profiles").insert([{
                        auth_user_id: data.user.id, 
                        email: data.user.email,
                        role: 'Customer'
                    }]);

                    if (profileErr) {
                        console.error("Profile creation error:", profileErr);
                        showMessage("Account created, but failed to set role. Contact admin.");
                        setLoading(false);
                        return;
                    }
                }

                showMessage("Account created successfully! Logging you in...", false);
                setTimeout(() => routeUser(data.user), 1500);
            }
        }

        // --- BULLETPROOF ROLE-BASED ROUTING ---
        async function routeUser(user) {
            if (!user) return;

            document.getElementById('form-subtitle').innerText = "Authenticating identity...";

            // FIX: Match by auth_user_id first
            let { data: profile, error } = await sb
                .from("Profiles")
                .select("role")
                .eq("auth_user_id", user.id)
                .single();

            // FALLBACK: If auth_user_id fails, search by email to be 100% safe
            if (!profile) {
                console.log("Auth ID not matched. Attempting email match...");
                const fallbackRes = await sb
                    .from("Profiles")
                    .select("role")
                    .eq("email", user.email)
                    .single();
                
                profile = fallbackRes.data;
            }

            // Route based on database role
            if (profile) {
                document.getElementById('form-subtitle').innerText = `Welcome back. Accessing ${profile.role} Portal...`;
                
                // Adding slight delay so the user can read the status text
                setTimeout(() => {
                    if (profile.role === 'Admin') {
                        window.location.href = '/admin/';
                    } else if (profile.role === 'Operator') {
                        window.location.href = '/operator/';
                    } else {
                        window.location.href = '/customer/';
                    }
                }, 800);
            } else {
                showMessage("Profile configuration error. Contact System Admin.");
                setLoading(false);
                // Logging out so they aren't stuck in a broken session
                await sb.auth.signOut();
            }
        }

        // --- VISUAL EFFECTS (Glass Tilt & Neural Canvas) ---
        const card = document.getElementById('main-card');
        document.addEventListener('mousemove', (e) => {
            if (!card) return;
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
            card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            const rotateX = ((e.clientY - centerY) / centerY) * -3; 
            const rotateY = ((e.clientX - centerX) / centerX) * 3;
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        const canvas = document.getElementById('neural-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function initParticles() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; particles = [];
            for(let i=0; i<60; i++) particles.push({ x: Math.random() * width, y: Math.random() * height, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, size: Math.random() * 2 + 1 });
        }
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1; if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.fillStyle = "rgba(100, 255, 218, 0.4)"; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        window.addEventListener('resize', initParticles); initParticles(); animateParticles();

        // Fade in on load
        window.onload = () => {
            sb.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    document.getElementById('form-subtitle').innerText = "Active session detected. Routing...";
                    card.classList.add('visible');
                    setLoading(true);
                    routeUser(session.user);
                } else {
                    setTimeout(() => card.classList.add('visible'), 300);
                }
            });
        };

        // Allow pressing Enter to submit
        document.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                handleAuth();
            }
        });
    </script>
</body>
</html>
