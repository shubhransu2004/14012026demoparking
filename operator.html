<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Operator Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:30px;}
button{padding:10px;margin-top:10px;}
</style>
</head>
<body>

<h1>Operator Panel</h1>
<button onclick="logout()">Logout</button>
<button onclick="openGate('ENTRY')">Open Entry Gate</button>
<button onclick="openGate('EXIT')">Open Exit Gate</button>

<div id="liveEvents"></div>

<script>
const SB_URL="https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";
const { createClient } = supabase;
const sb = createClient(SB_URL,SB_KEY);

async function init(){
  const { data:{session} } = await sb.auth.getSession();
  if(!session){ window.location.href="login.html"; return; }
  loadEvents();
}

async function loadEvents(){
  const { data } = await sb.from("ParkingEvents")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(20);

  const div=document.getElementById("liveEvents");
  div.innerHTML="";
  data.forEach(e=>{
    div.innerHTML+=`<p>${e.plate_number} - ${e.event_type}</p>`;
  });
}

function openGate(type){
  alert(type+" gate opened (UI only)");
}

async function logout(){
  await sb.auth.signOut();
  window.location.href="login.html";
}

init();
</script>

</body>
</html>
