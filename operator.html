<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEEPARKING | Operator Control</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#020204;
--accent:#64ffda;
--text:#fff;
--glass:rgba(255,255,255,0.05);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
font-family:'Inter',sans-serif;
color:var(--text);
overflow:hidden;
height:100vh;
}

canvas{
position:absolute;
top:0;left:0;width:100%;height:100%;
z-index:0;
}

.glass{
position:relative;
z-index:10;
margin:60px auto;
width:90%;
max-width:1200px;
padding:40px;
border-radius:20px;
background:rgba(10,10,12,0.6);
backdrop-filter:blur(24px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 40px 80px rgba(0,0,0,0.8);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

h1{
font-size:2.5rem;
font-weight:800;
letter-spacing:-1px;
}

.logout{
background:transparent;
border:1px solid var(--accent);
color:var(--accent);
padding:10px 20px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.logout:hover{
background:var(--accent);
color:#000;
}

.table-container{
max-height:500px;
overflow:auto;
border-top:1px solid rgba(255,255,255,0.1);
padding-top:20px;
}

table{
width:100%;
border-collapse:collapse;
font-family:'JetBrains Mono',monospace;
}

th,td{
padding:14px;
text-align:left;
border-bottom:1px solid rgba(255,255,255,0.05);
}

th{
color:var(--accent);
font-weight:700;
font-size:0.85rem;
letter-spacing:1px;
text-transform:uppercase;
}

tr:hover{
background:rgba(100,255,218,0.05);
}

.status-enter{color:#22c55e;}
.status-exit{color:#f87171;}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="glass">

<div class="header">
<h1>Operator Console</h1>
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Plate</th>
<th>Event</th>
<th>Timestamp</th>
</tr>
</thead>
<tbody id="eventBody"></tbody>
</table>
</div>

</div>

<script>
const SB_URL="https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";
const { createClient } = supabase;
const sb = createClient(SB_URL,SB_KEY);

async function init(){
const { data:{session} } = await sb.auth.getSession();
if(!session){ window.location.href="login.html"; return; }
loadEvents();
}

async function loadEvents(){
const { data,error } = await sb.from("ParkingEvents")
.select("*")
.order("created_at",{ascending:false})
.limit(100);

if(error){console.error(error);return;}

const body=document.getElementById("eventBody");
body.innerHTML="";

data.forEach(e=>{
body.innerHTML+=`
<tr>
<td>${e.plate_number}</td>
<td class="${e.event_type==='ENTER'?'status-enter':'status-exit'}">${e.event_type}</td>
<td>${new Date(e.created_at).toLocaleString()}</td>
</tr>
`;
});
}

async function logout(){
await sb.auth.signOut();
window.location.href="login.html";
}

init();
</script>

<script>
// Subtle neural background
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.fillStyle="rgba(100,255,218,0.3)";
ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
