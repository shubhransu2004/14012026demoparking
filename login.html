<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FeeParking Secure Access</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Segoe UI, sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#111827,#0f172a,#0ea5e9,#6366f1);
  background-size:400% 400%;
  animation:gradientMove 15s ease infinite;
  overflow:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.login-card{
  width:500px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  padding:40px;
  border-radius:16px;
  color:white;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

.login-card h2{
  text-align:center;
  margin-bottom:25px;
  font-weight:1000;
  letter-spacing:5px;
}

.input-group{
  margin-bottom:15px;
  transition:all 0.4s ease;
}

input, select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  outline:none;
  font-size:14px;
}

input{
  background:#f1f5f9;
}

select{
  background:#e2e8f0;
}

button{
  width:100%;
  padding:10px;
  background:#3b82f6;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  transition:1s;
  font-weight:800;
}

button:hover{
  background:#2563eb;
  transform:translateY(-8px);
}

.hidden{
  opacity:0;
  height:0;
  overflow:hidden;
  margin:0;
  padding:0;
}
</style>
</head>

<body>

<div class="login-card">
  <h2>FeeParking Access</h2>

  <div class="input-group">
    <select id="role" onchange="toggleFields()">
      <option value="Customer" selected>Customer</option>
      <option value="Admin">Admin</option>
      <option value="Operator">Operator</option>
    </select>
  </div>

  <div class="input-group">
    <input id="email" placeholder="Email address">
  </div>

  <div class="input-group hidden" id="vehicleGroup">
    <input id="vehicle" placeholder="Vehicle Registration Number">
  </div>

  <div class="input-group hidden" id="passwordGroup">
    <input id="password" type="password" placeholder="Password">
  </div>

  <button onclick="handleLogin()">Continue</button>
</div>

<script>
const SB_URL="https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";

const { createClient } = supabase;
const sb = createClient(SB_URL,SB_KEY);

function toggleFields(){
  const role=document.getElementById("role").value;

  const vehicleGroup=document.getElementById("vehicleGroup");
  const passwordGroup=document.getElementById("passwordGroup");

  if(role==="Customer"){
    vehicleGroup.classList.remove("hidden");
    passwordGroup.classList.add("hidden");
  } else {
    vehicleGroup.classList.add("hidden");
    passwordGroup.classList.remove("hidden");
  }
}

async function handleLogin(){
  const role=document.getElementById("role").value;
  const email=document.getElementById("email").value.trim();
  const vehicle=document.getElementById("vehicle").value.trim();
  const password=document.getElementById("password").value;

  if(role==="Customer"){
    if(!email.includes("@")){
      alert("Valid email required");
      return;
    }

    if(vehicle===""){
      alert("Vehicle number required");
      return;
    }

    const { error } = await sb.auth.signInWithOtp({
      email: email,
      options:{ shouldCreateUser:true }
    });

    if(error){ alert(error.message); return; }

    alert("OTP sent to email. Check your inbox.");
  }
  else{
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ alert(error.message); return; }

    if(role==="Admin") window.location.href="admin.html";
    if(role==="Operator") window.location.href="operator.html";
  }
}

toggleFields();
</script>

</body>
</html>
