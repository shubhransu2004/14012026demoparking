<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FeeParking | Secure Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-950 flex items-center justify-center min-h-screen text-white">

<div class="bg-slate-900 p-8 rounded-2xl w-96 shadow-xl border border-slate-800">
  <h2 class="text-2xl font-semibold mb-6 text-center">Admin Login</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full mb-4 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">

  <input id="password" type="password" placeholder="Password"
    class="w-full mb-6 px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-400">

  <button onclick="login()"
    class="w-full bg-emerald-500 hover:bg-emerald-600 transition py-2 rounded-lg font-semibold">
    Login
  </button>

  <p id="error" class="text-red-400 text-sm mt-4 text-center"></p>
</div>

<script>
const SB_URL  = "https://vlxyoxuejydfpclhxczr.supabase.co";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZseHlveHVlanlkZnBjbGh4Y3pyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MjkzMjEsImV4cCI6MjA4NjQwNTMyMX0.0EDvZze2wMM_w1gqGxbgylfH9V3krfk87I7u3bUuCro";

const { createClient } = supabase;

const sb = createClient(SB_URL, SB_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: true
  }
});

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("error").textContent = error.message;
  } else {
    window.location.href = "admin.html";
  }
}
</script>

</body>
</html>
